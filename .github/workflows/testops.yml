name: testops

on:
  workflow_dispatch:        # manual trigger + TestOps rerun entry point
    inputs:
      ALLURE_JOB_RUN_ID:
        description: "ALLURE_JOB_RUN_ID service parameter. Leave blank."
        required: false
      ALLURE_USERNAME:
        description: "ALLURE_USERNAME service parameter. Leave blank."
        required: false
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CYPRESS_RUN_PARITY: ${{ github.run_number }}   # demo: drives cross-launch flakiness
      # References to repository secrets (Settings -> Secrets and variables -> Actions)
      ALLURE_ENDPOINT: ${{ secrets.ALLURE_ENDPOINT }}
      ALLURE_TOKEN: ${{ secrets.ALLURE_TOKEN }}
      ALLURE_PROJECT_ID: ${{ secrets.ALLURE_PROJECT_ID }}
      ALLURE_LAUNCH_NAME: "Cypress demo #${{ github.run_number }}"
      ALLURE_RESULTS: allure-results   # where allure-cypress writes result files
      ALLURE_JOB_RUN_ID: ${{ github.event.inputs.ALLURE_JOB_RUN_ID }}   # rerun context from TestOps
      ALLURE_LAUNCH_TAGS: "cypress,demo"                                # tags shown on the launch
      ALLURE_JOB_PARAMETERS: "browser=Electron,os=Linux,device=demo-stand"
    steps:
      - uses: actions/checkout@v4         # check out the repository code

      - uses: actions/setup-node@v4       # install Node.js
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci                       # install Cypress and allure-cypress

      - name: Install allurectl
        uses: allure-framework/setup-allurectl@v1

      - name: Run tests and stream to TestOps
        run: allurectl watch -- npm run local:run   # start site, run Cypress, stream results

      - name: Debug — check allure results
        if: always()                                # run this even when tests fail
        run: ls allure-results || echo "no allure-results folder created"
